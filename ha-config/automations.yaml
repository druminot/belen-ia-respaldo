- id: lg_tv_turn_on_wol
  alias: "LG TV - Encender via WoL"
  trigger:
    - platform: event
      event_type: call_service
      event_data:
        domain: media_player
        service: turn_on
  action:
    - service: wake_on_lan.send_magic_packet
      data:
        mac: "a0:6f:aa:b9:bd:38"
        broadcast_address: "192.168.1.255"
