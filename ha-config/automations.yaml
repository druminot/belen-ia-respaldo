- id: lg_homekit_remote_up
  alias: LG Remote UP
  trigger:
    - platform: event
      event_type: homekit_tv_remote_key_pressed
      event_data:
        key_name: arrow_up
        entity_id: media_player.lg_webos_tv_43uj6510_sa
  action:
    - service: webostv.button
      data:
        entity_id: media_player.lg_webos_tv_43uj6510_sa
        button: UP

